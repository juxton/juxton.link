name: Bug report
description: Report a bug or regression.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please provide as much detail as possible.

  - type: textarea
    id: expected_vs_actual
    attributes:
      label: Expected vs actual behavior
      description: Describe what you expected to happen and what happened instead.
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: textarea
    id: reproduction_steps
    attributes:
      label: Reproduction steps
      description: Provide a numbered set of steps to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true

  - type: input
    id: affected_files
    attributes:
      label: Affected file(s) (if known)
      description: Paths to files likely related to this issue.
      placeholder: content/links/example.md, app/page.tsx
    validations:
      required: true
