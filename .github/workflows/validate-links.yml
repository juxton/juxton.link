name: Validate Links

on:
  pull_request:
    paths:
      - 'data/categories/**/*.md'
      - 'lib/**/*.ts'
      - 'app/**/*.ts'
      - 'app/**/*.tsx'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/validate-links.yml'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run link-only validation
        run: |
          set -euo pipefail

          if npm run | grep -qE '^\s{2}validate:link-data$'; then
            npm run validate:link-data
          elif npm run | grep -qE '^\s{2}validate:links$'; then
            npm run validate:links
          else
            echo "No dedicated link validation script found (validate:link-data or validate:links)."
            echo "Skipping link-only workflow check because link validation is covered by the core Validate workflow."
          fi
