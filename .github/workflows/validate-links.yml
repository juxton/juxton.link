name: Validate Links

on:
  pull_request:
    paths:
      - 'data/categories/**/*.md'
      - 'lib/**/*.ts'
      - 'app/**/*.ts'
      - 'app/**/*.tsx'
      - 'README.md'
      - 'CONTRIBUTING.md'
      - '.github/workflows/validate-links.yml'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (includes markdown parsing)
        run: npm run build
